trigger:
- none

pool:
  vmImage: ubuntu-latest

name: $(Year:yy).$(DayOfYear).$(Rev:r)

steps:
  - checkout: self
    submodules: recursive    

# 🔹 Build the Docker Image ONCE
  - task: Docker@2

    displayName: Build new Docker Image $(Build.BuildNumber) | latest
    inputs:
      containerRegistry: "shoppingacr"
      repository: "shopping.microservce"
      command: "build"
      Dockerfile: "**/Dockerfile"
      buildContext: "."
      tags: |
        $(Build.BuildNumber)
        latest

# 🔹 Push the Image to ACR
  - task: Docker@2
    displayName: Push Docker Image $(Build.BuildNumber) | latest
    inputs:
      containerRegistry: "shoppingacr"
      repository: "shopping.microservce"
      command: "push"
      Dockerfile: "**/Dockerfile"
      tags: |
        $(Build.BuildNumber)
        latest