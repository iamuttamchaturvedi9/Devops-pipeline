trigger:
- none

pool:
  vmImage: ubuntu-latest

name: $(Year:yy).$(DayOfYear).$(Rev:r)

steps:
  - checkout: self
    submodules: recursive    

# 🔹 Build and Push the Image to ACR
  - task: Docker@2
    displayName: Push Docker Image $(Build.BuildNumber) | latest
    inputs:
      containerRegistry: "shoppingacr"
      repository: "shopping.microservice"
      command: "buildAndPush"
      Dockerfile: "**/Dockerfile"
      tags: |
        $(Build.BuildNumber)
        latest